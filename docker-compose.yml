services:
  caddy:
    build:
      context: .
      dockerfile: site/Dockerfile
    restart: unless-stopped
    depends_on:
      - waline
    networks:
      - default
      - shared

  waline:
    image: lizheming/waline:latest
    restart: unless-stopped
    expose:
      - "8360"
    volumes:
      - waline-data:/app/data
    environment:
      TZ: ${TZ:-America/Los_Angeles}
      SQLITE_PATH: /app/data
      JWT_TOKEN: ${WALINE_JWT_TOKEN}
      SITE_NAME: ${SITE_DOMAIN}
      SITE_URL: https://${SITE_DOMAIN}
      SECURE_DOMAINS: ${SITE_DOMAIN},comments.${SITE_DOMAIN}
      AUTHOR_EMAIL: ${WALINE_AUTHOR_EMAIL:-}
      SMTP_SERVICE: ${WALINE_SMTP_SERVICE:-}
      SMTP_USER: ${WALINE_SMTP_USER:-}
      SMTP_PASS: ${WALINE_SMTP_PASS:-}
      DISABLE_REGION: 'true'

  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    restart: unless-stopped
    environment:
      DOCKER_ENABLE_SECURITY: "true"
      SECURITY_ENABLELOGIN: "true"
      SECURITY_INITIALLOGIN_USERNAME: ${STIRLING_ADMIN_USERNAME}
      SECURITY_INITIALLOGIN_PASSWORD: ${STIRLING_ADMIN_PASSWORD}
      SYSTEM_ENABLEANALYTICS: "false"
      SYSTEM_DEFAULTLOCALE: "en_US"
      UI_APPNAME: "Stirling PDF"
      LANGS: "en_US"
    volumes:
      - stirling-configs:/configs
      - stirling-custom-files:/customFiles
      - stirling-logs:/logs
      - stirling-tessdata:/usr/share/tessdata
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  default:
  shared:
    external: true
    name: vmattoo-shared

volumes:
  waline-data:
  stirling-configs:
  stirling-custom-files:
  stirling-logs:
  stirling-tessdata:
