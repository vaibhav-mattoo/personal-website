# Production VM: SITE_DOMAIN=vmattoo.dev docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  caddy:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?Set SITE_DOMAIN to your public hostname, e.g. vmattoo.dev}
      RATE_LIMIT_EVENTS: ${RATE_LIMIT_EVENTS:-100}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-1m}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 64M
